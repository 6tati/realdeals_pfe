services:
  mysql:
    image: mysql:8.0
    container_name: mysql-realdeals
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: realdeals
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql-realdeals
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - mysql

volumes:
  mysql_data: